name: dashboard_aggregate

# ダッシュボード用データ集約。15分おきに各APIを叩いて dashboard/data.json を更新する。
# 失敗しても他のbot機能には影響しない (独立workflow)。

on:
  schedule:
    # 15分おき (UTCで指定。0分,15分,30分,45分)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 手動キック用

permissions:
  contents: write  # data.json コミット用
  actions: read    # workflow runs 取得用

concurrency:
  group: dashboard-aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run aggregate
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          ANTHROPIC_BALANCE_USD: ${{ secrets.ANTHROPIC_BALANCE_USD }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d7brc0dm5p6s73f4eobg
        run: python scripts/aggregate_dashboard.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          # 差分があればコミット
          if ! git diff --staged --quiet; then
            git commit -m "chore(dashboard): update data.json $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          else
            echo "no changes"
          fi
