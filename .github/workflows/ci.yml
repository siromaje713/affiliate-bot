name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt pytest
      - run: python -m py_compile orchestrator.py
      - run: |
          for f in agents/*.py scripts/*.py; do
            [ -f "$f" ] && python -m py_compile "$f"
          done
      - run: pytest tests/ -v
