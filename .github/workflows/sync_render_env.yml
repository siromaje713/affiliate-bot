name: Render環境変数週次同期

on:
  schedule:
    - cron: "0 1 * * 0"
  workflow_dispatch:

jobs:
  sync-env-vars:
    runs-on: ubuntu-latest
    steps:
      - name: env groupを更新
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          THREADS_TOKEN_EXPIRES_AT: ${{ secrets.THREADS_TOKEN_EXPIRES_AT }}
        run: |
          set -e
          ENV_GROUP_ID="evg-d75m22chg0os73arufsg"

          # 更新する変数リスト
          VARS='[
            {"key":"ANTHROPIC_API_KEY","value":"'"$(echo -n $ANTHROPIC_API_KEY)"'"},
            {"key":"THREADS_ACCESS_TOKEN","value":"'"$(echo -n $THREADS_ACCESS_TOKEN)"'"},
            {"key":"THREADS_USER_ID","value":"'"$(echo -n $THREADS_USER_ID)"'"},
            {"key":"SLACK_WEBHOOK_URL","value":"'"$(echo -n $SLACK_WEBHOOK_URL)"'"},
            {"key":"THREADS_TOKEN_EXPIRES_AT","value":"'"$(echo -n $THREADS_TOKEN_EXPIRES_AT)"'"}
          ]'

          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$VARS" \
            "https://api.render.com/v1/env-groups/$ENV_GROUP_ID/env-vars")

          echo "HTTP $STATUS"
          cat /tmp/response.json

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "✅ env group同期完了"
          else
            echo "❌ env group同期失敗"
            exit 1
          fi

      - name: Slack通知
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="✅ Render環境変数週次同期完了"
          else
            MSG="❌ Render環境変数週次同期失敗"
          fi
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MSG\"}" \
            "$SLACK_WEBHOOK_URL" || true
