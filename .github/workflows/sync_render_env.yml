name: Render環境変数週次同期

on:
  schedule:
    - cron: "0 1 * * 0"  # 毎週日曜 UTC 1:00 (JST 10:00)
  workflow_dispatch:

jobs:
  sync-env-vars:
    runs-on: ubuntu-latest
    steps:
      - name: Render環境変数を同期
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          THREADS_TOKEN_EXPIRES_AT: ${{ secrets.THREADS_TOKEN_EXPIRES_AT }}
        run: |
          set -e
          SERVICES="crn-d72ovqm3jp1c7386q0fg crn-d741a6q4d50c73bvbavg"

          for SERVICE_ID in $SERVICES; do
            echo "🔄 $SERVICE_ID の環境変数を同期中..."

            EXISTING=$(curl -sf \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$SERVICE_ID/env-vars" || echo "[]")

            MERGED=$(python3 << 'PYEOF'
import json, os, sys

existing_raw = os.environ.get("EXISTING_JSON", "[]")
try:
    existing = json.loads(existing_raw)
    existing_map = {item["envVar"]["key"]: item["envVar"]["value"] for item in existing}
except Exception:
    existing_map = {}

updates = {
    "ANTHROPIC_API_KEY": os.environ.get("ANTHROPIC_API_KEY", ""),
    "THREADS_ACCESS_TOKEN": os.environ.get("THREADS_ACCESS_TOKEN", ""),
    "THREADS_USER_ID": os.environ.get("THREADS_USER_ID", ""),
    "SLACK_WEBHOOK_URL": os.environ.get("SLACK_WEBHOOK_URL", ""),
    "THREADS_TOKEN_EXPIRES_AT": os.environ.get("THREADS_TOKEN_EXPIRES_AT", ""),
}

existing_map.update({k: v for k, v in updates.items() if v})
result = [{"key": k, "value": v} for k, v in existing_map.items()]
print(json.dumps(result))
PYEOF
            )

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "$MERGED" \
              "https://api.render.com/v1/services/$SERVICE_ID/env-vars")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "✅ $SERVICE_ID 同期完了 (HTTP $STATUS)"
            else
              echo "❌ $SERVICE_ID 同期失敗 (HTTP $STATUS)"
              exit 1
            fi
          done

      - name: Slack通知
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="✅ Render環境変数週次同期完了"
          else
            MSG="❌ Render環境変数週次同期失敗 - GitHub Actionsを確認してください"
          fi
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MSG\"}" \
            "$SLACK_WEBHOOK_URL" || true
