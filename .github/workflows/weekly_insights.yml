name: Daily Insights Analysis

on:
  schedule:
    - cron: '0 17 * * *'  # 毎日UTC 17:00 = JST 02:00
  workflow_dispatch:

jobs:
  insights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run insights analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python3 orchestrator.py --mode insights

      - name: Commit updated own_insights.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/cache/own_insights.json
          git diff --staged --quiet || git commit -m "chore: update own_insights [skip ci]"
          git push
