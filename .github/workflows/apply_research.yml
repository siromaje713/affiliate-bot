name: Apply Research to Winning Patterns

on:
  push:
    paths:
      - 'docs/research_*.json'
  workflow_dispatch:

jobs:
  apply-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install anthropic
      - name: Find latest research file
        id: find_research
        run: |
          LATEST=$(ls docs/research_*.json 2>/dev/null | sort -r | head -1)
          if [ -z "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "file=$LATEST" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Analyze and update winning patterns
        if: steps.find_research.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEARCH_FILE: ${{ steps.find_research.outputs.file }}
        run: |
          python3 << 'PYEOF'
          import json, os, anthropic
          with open(os.environ['RESEARCH_FILE'], 'r', encoding='utf-8') as f:
              research_data = json.load(f)
          try:
              with open('winning_patterns.json', 'r', encoding='utf-8') as f:
                  current = json.load(f)
          except Exception:
              current = {"top_patterns": [], "hook_patterns": {}, "emotion_triggers": [], "top_categories": [], "benchmark_insights": []}
          client = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])
          prompt = f"""美容系ThreadsアフィリエイトのAIアナリストとして分析してwinning_patterns.jsonを更新してください。
リサーチデータ: {json.dumps(research_data, ensure_ascii=False)}
現在のpatterns: {json.dumps(current, ensure_ascii=False)}
JSONのみ返してください。top_patternsは上位10件。既存とマージして更新。
構造: {{"version":"1.0","last_updated":"YYYY-MM-DD","top_patterns":[{{"pattern_type":"","hook_example":"","avg_likes":0,"reason":""}}],"hook_patterns":{{"専門家ゾッと型":{{"score":0,"sample":"","count":0}},"悩み直撃型":{{"score":0,"sample":"","count":0}},"話題便乗型":{{"score":0,"sample":"","count":0}},"情報訂正型":{{"score":0,"sample":"","count":0}},"断言命令型":{{"score":0,"sample":"","count":0}},"DM要請型":{{"score":0,"sample":"","count":0}},"自虐キャラ型":{{"score":0,"sample":"","count":0}}}},"emotion_triggers":[],"top_categories":[],"benchmark_insights":[]}}"""
          msg = client.messages.create(model="claude-haiku-4-5-20251001", max_tokens=2000,
              messages=[{"role": "user", "content": prompt}])
          text = msg.content[0].text.strip().replace('```json','').replace('```','').strip()
          updated = json.loads(text)
          with open('winning_patterns.json', 'w', encoding='utf-8') as f:
              json.dump(updated, f, ensure_ascii=False, indent=2)
          print("winning_patterns.json updated")
          PYEOF
      - name: Commit
        if: steps.find_research.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add winning_patterns.json
          git diff --cached --quiet || (git commit -m "auto: winning_patterns.json更新" && git push origin main)
      - name: Notify Slack
        if: steps.find_research.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
            -d '{"text":"✅ winning_patterns.json更新完了。次の投稿から反映されます。"}'
