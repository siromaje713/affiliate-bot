name: Slack Cowork Research Reminder

on:
  schedule:
    - cron: '0 23 * * 0,1,3,5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack reminder
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
            -d '{"text":"🔔 Coworkリサーチの時間です（2日に1回）\n\n① Coworkを起動\n② 固定プロンプトを実行\n③ あとは全自動でwinning_patterns.jsonが更新されます"}'
